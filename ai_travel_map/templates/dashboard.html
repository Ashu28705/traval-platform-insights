<!DOCTYPE html>
<html>

<head>

    <title>TravelAI Dashboard</title>

    <link rel="stylesheet" href="/static/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <h2>TravelAI</h2>

        <div class="nav-right">
            Welcome {{name}}
            <a href="/logout">Logout</a>
        </div>

    </nav>


    <div class="dashboard-container">

        <!-- SEARCH SECTION -->

        <div class="search-section">

            <h2 class="search-title">Search Travel Destination</h2>

            <form action="/search" method="POST" class="search-box">

                <input type="text" name="city" placeholder="Enter city or country" required>

                <button type="submit">Search</button>

            </form>

        </div>


        <!-- INFO CARDS -->

        <div class="cards">

            <div class="card">
                <h4>Weather</h4>
                <p>{{weather}}</p>
            </div>

            <div class="card">
                <h4>Crowd Level</h4>
                <p>{{crowd}}</p>
            </div>

            <div class="card">
                <h4>Best Month</h4>
                <p>{{best_month}}</p>
            </div>

        </div>


        <!-- CROWD ANALYTICS -->

        <div class="analytics">

            <h2 class="section-title">Crowd Analytics</h2>

            <div class="chart-box">
                <canvas id="crowdChart"></canvas>
            </div>

        </div>


        <!-- MAP SECTION -->

        <div class="map-section">

            <h2 class="section-title">Location Map</h2>

            <div class="chart-box">

                <iframe width="100%" height="400" style="border:0" loading="lazy" allowfullscreen
                    src="https://www.google.com/maps?q={{city}}&output=embed">
                </iframe>

            </div>

        </div>


        <!-- DESTINATIONS -->

        <div class="destinations-section">

            <h2 class="section-title">Popular Destinations</h2>

            <div class="destinations">

                <div class="destination-card">
                    <img src="/static/images/paris.jpg">
                    <div class="destination-info">
                        <h4>Paris</h4>
                        <p>⭐ 4.8</p>
                    </div>
                </div>

                <div class="destination-card">
                    <img src="/static/images/bali.jpg">
                    <div class="destination-info">
                        <h4>Bali</h4>
                        <p>⭐ 4.7</p>
                    </div>
                </div>

                <div class="destination-card">
                    <img src="/static/images/dubai.jpg">
                    <div class="destination-info">
                        <h4>Dubai</h4>
                        <p>⭐ 4.6</p>
                    </div>
                </div>

                <div class="destination-card">
                    <img src="/static/images/switzerland.jpg">
                    <div class="destination-info">
                        <h4>Switzerland</h4>
                        <p>⭐ 4.9</p>
                    </div>
                </div>

            </div>

        </div>

    </div>


    <script>

        const ctx = document.getElementById('crowdChart');

        new Chart(ctx, {

            type: 'bar',

            data: {

                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],

                datasets: [{
                    label: 'Crowd Index',
                    data: [20, 30, 45, 60, 40, 25],
                    backgroundColor: 'rgba(52,152,219,0.6)'
                }]

            },

            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }

        });

    </script>

</body>

</html>
